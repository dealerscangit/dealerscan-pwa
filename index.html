<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a5296" />
  <title>DealerScan</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS Add-to-Home-Screen specifics -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DealerScan" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main>
    <!-- Screen: sign-in (first launch / no salesperson chosen) -->
    <section data-screen="signin" hidden>
      <header class="signin-header">
        <h1>Welcome</h1>
        <p class="muted">Tap your name to get started.</p>
      </header>
      <div class="picker-grid" id="picker-grid">
        <!-- tiles injected by JS from SALESPEOPLE -->
      </div>
    </section>

    <!-- Screen: home (signed in) -->
    <section data-screen="home" hidden>
      <h1 class="home-greeting" id="home-greeting">Hi 👋</h1>
      <div class="scaffold-note">
        Sign-in working. Next: home screen with "New Scan" button and recent activity.
        <br><br>
        <span style="opacity: 0.7;">Dev tip: long-press the greeting above to reset sign-in.</span>
      </div>
    </section>
  </main>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
