<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a5296" />
  <title>DealerScan</title>

  <link rel="manifest" href="manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DealerScan" />
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=9" />

  <link rel="stylesheet" href="styles/main.css?v=10" />
</head>
<body>
  <main>

    <!-- ─────────────────────────────────────────────
         SCREEN 1: sign-in (salesperson picker)
         ───────────────────────────────────────────── -->
    <section data-screen="signin" hidden>
      <header class="signin-header">
        <h1>Welcome</h1>
        <p class="muted">Tap your name to get started.</p>
      </header>
      <div class="picker-grid" id="picker-grid"></div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 2: home (signed in)
         ───────────────────────────────────────────── -->
    <section data-screen="home" hidden>
      <header class="home-header">
        <h1 class="home-greeting" id="home-greeting">Hi 👋</h1>
        <p class="muted">Ready to scan some docs?</p>
      </header>

      <button class="primary-card" id="btn-new-scan" type="button">
        <span class="primary-card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/></svg>
        </span>
        <span class="primary-card-label">New Scan</span>
        <span class="primary-card-sub">Start a scan for a customer</span>
      </button>

      <section class="recent-section">
        <div class="section-header">
          <h2>Recent customers</h2>
          <span class="dim small" id="recent-count"></span>
        </div>
        <div class="recent-list" id="recent-list">
          <div class="recent-empty muted small">Loading…</div>
        </div>
      </section>

      <!-- DEV-ONLY footer. Remove before public launch. -->
      <footer class="dev-footer">
        <button id="signout-btn" class="text-link" type="button">Sign out</button>
      </footer>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 3: customer picker
         ───────────────────────────────────────────── -->
    <section data-screen="customer" hidden>
      <header class="screen-header">
        <button class="icon-button" data-back="home" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Customer</h1>
      </header>

      <div class="search-wrap">
        <input id="customer-input" type="text" placeholder="Type customer name…" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" />
      </div>

      <div class="recent-section">
        <div class="section-header">
          <h2>Recent</h2>
        </div>
        <div class="recent-list" id="customer-recent-list">
          <div class="recent-empty muted small">Loading…</div>
        </div>
      </div>

      <footer class="sticky-action" id="new-customer-cta" hidden>
        <button class="primary-button" id="btn-new-customer" type="button">
          + Use as new customer
        </button>
      </footer>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 4: camera (STUB — fake capture)
         ───────────────────────────────────────────── -->
    <section data-screen="camera" hidden>
      <header class="screen-header">
        <button class="icon-button" data-back="customer" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Scan</h1>
      </header>

      <div class="camera-stub">
        <div class="camera-stub-icon" aria-hidden="true">📷</div>
        <h2>Camera coming soon</h2>
        <p class="muted">This is a stub for testing the flow.</p>
        <p class="dim small" id="camera-customer-label"></p>
        <button class="primary-button" id="btn-fake-capture" type="button">
          Simulate 3 photos
        </button>
      </div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 5: review
         ───────────────────────────────────────────── -->
    <section data-screen="review" hidden>
      <header class="screen-header">
        <button class="icon-button" data-back="camera" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Review</h1>
      </header>

      <p class="muted small" id="review-summary"></p>
      <div class="review-grid" id="review-grid"></div>

      <footer class="sticky-action">
        <button class="primary-button" id="btn-upload-all" type="button">
          Upload all
        </button>
      </footer>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 6: upload progress
         ───────────────────────────────────────────── -->
    <section data-screen="upload" hidden>
      <header class="screen-header">
        <h1>Uploading…</h1>
      </header>

      <p class="muted small" id="upload-summary"></p>
      <ul class="upload-list" id="upload-list"></ul>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 7: done
         ───────────────────────────────────────────── -->
    <section data-screen="done" hidden>
      <div class="done-wrap">
        <div class="done-check" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>All set</h1>
        <p class="muted" id="done-summary">Uploaded.</p>

        <div class="done-actions">
          <button class="primary-button" id="btn-scan-another-same" type="button">Scan more for this customer</button>
          <button class="secondary-button" id="btn-scan-different" type="button">Different customer</button>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="scripts/app.js?v=9"></script>
</body>
</html>
