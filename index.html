<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a5296" />
  <title>DealerScan</title>

  <link rel="manifest" href="manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DealerScan" />
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=9" />

  <link rel="stylesheet" href="styles/main.css?v=14" />
</head>
<body>
  <main>

    <!-- ─────────────────────────────────────────────
         SCREEN 1: sign-in (salesperson picker)
         ───────────────────────────────────────────── -->
    <section data-screen="signin" hidden>
      <header class="signin-header">
        <h1>Welcome</h1>
        <p class="muted">Tap your name to get started.</p>
      </header>
      <div class="picker-grid" id="picker-grid"></div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 2: home (signed in)
         ───────────────────────────────────────────── -->
    <section data-screen="home" hidden>
      <header class="home-header">
        <h1 class="home-greeting" id="home-greeting">Hi 👋</h1>
        <p class="muted">Ready to scan some docs?</p>
      </header>

      <button class="primary-card" id="btn-new-scan" type="button">
        <span class="primary-card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/></svg>
        </span>
        <span class="primary-card-label">New Scan</span>
        <span class="primary-card-sub">Start a scan for a customer</span>
      </button>

      <section class="recent-section">
        <div class="section-header">
          <h2>Recent customers</h2>
          <span class="dim small" id="recent-count"></span>
        </div>
        <div class="recent-list" id="recent-list">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
        </div>
      </section>

      <!-- DEV-ONLY footer. Remove before public launch. -->
      <footer class="dev-footer">
        <button id="signout-btn" class="text-link" type="button">Sign out</button>
      </footer>

      <div class="version-footer" id="version-footer">DealerScan PWA v0.1</div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 3: customer picker
         ───────────────────────────────────────────── -->
    <section data-screen="customer" hidden>
      <header class="screen-header">
        <button class="icon-button" data-back="home" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Customer</h1>
      </header>

      <div class="search-wrap">
        <input id="customer-input" type="text" placeholder="Type customer name…" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" />

        <!-- Inline "use as new" CTA — appears immediately under the input when
             typed text doesn't match an existing customer. Sits where the
             salesperson's finger already is, no scrolling required when the
             keyboard is up. -->
        <button class="inline-new-cta" id="btn-new-customer" type="button" hidden>
          <span class="inline-new-cta-plus" aria-hidden="true">+</span>
          <span class="inline-new-cta-label">Use "<span id="new-customer-name-echo"></span>" as new customer</span>
          <span class="inline-new-cta-chev" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </button>
      </div>

      <div class="recent-section">
        <div class="section-header">
          <h2>Recent</h2>
        </div>
        <div class="recent-list" id="customer-recent-list">
          <div class="recent-empty muted small">Loading…</div>
        </div>
      </div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 4: camera (real getUserMedia capture)
         Full-bleed viewfinder, big shutter, Done button, thumbnail
         peek of the most recent capture in the bottom-left.
         ───────────────────────────────────────────── -->
    <section data-screen="camera" hidden>
      <div class="camera-stage" id="camera-stage">

        <!-- Live video viewfinder (full-bleed) -->
        <video id="camera-video" class="camera-video" playsinline autoplay muted></video>

        <!-- Capture canvas — offscreen, used to grab frames from <video> -->
        <canvas id="camera-canvas" hidden></canvas>

        <!-- Shutter flash overlay — fades white briefly on capture -->
        <div class="camera-flash" id="camera-flash" aria-hidden="true"></div>

        <!-- Top chrome: back + Done -->
        <div class="camera-top">
          <button class="icon-button camera-chrome-btn" data-back="customer" type="button" aria-label="Cancel and go back">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="camera-customer-chip" id="camera-customer-chip"></div>
          <button class="camera-done-btn" id="btn-camera-done" type="button" disabled>
            <span id="camera-done-label">Done</span>
          </button>
        </div>

        <!-- Bottom chrome: thumbnail peek + shutter + count -->
        <div class="camera-bottom">
          <button class="camera-thumb-peek" id="camera-thumb-peek" type="button" hidden aria-label="Review captured photos">
            <img id="camera-thumb-peek-img" alt="" />
            <span class="camera-thumb-peek-count" id="camera-thumb-peek-count">0</span>
          </button>

          <button class="camera-shutter" id="btn-shutter" type="button" aria-label="Capture photo">
            <span class="camera-shutter-ring"></span>
            <span class="camera-shutter-core"></span>
          </button>

          <div class="camera-bottom-right-spacer" aria-hidden="true"></div>
        </div>

        <!-- Permission denied / no camera fallback -->
        <div class="camera-fallback" id="camera-fallback" hidden>
          <div class="camera-fallback-icon" aria-hidden="true">📷</div>
          <h2>Camera unavailable</h2>
          <p class="muted" id="camera-fallback-msg">
            We couldn't open the camera. You can pick photos from your library instead.
          </p>
          <label class="primary-button camera-fallback-picker">
            Pick from library
            <input id="camera-file-fallback" type="file" accept="image/*" multiple hidden />
          </label>
          <button class="secondary-button" id="btn-camera-fallback-retry" type="button" style="margin-top: 8px;">
            Try camera again
          </button>
        </div>

      </div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 5: review
         ───────────────────────────────────────────── -->
    <section data-screen="review" hidden>
      <header class="screen-header">
        <button class="icon-button" data-back="camera" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Review</h1>
      </header>

      <p class="muted small" id="review-summary"></p>
      <div class="review-grid" id="review-grid"></div>

      <footer class="sticky-action">
        <button class="primary-button" id="btn-upload-all" type="button">
          Upload all
        </button>
      </footer>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 6: upload progress (card-deck)
         The deck holds N stacked cards, top card is "active" (uploading
         right now). As each card completes it animates off-screen and
         the next card slides forward. Stack visibly shrinks.
         ───────────────────────────────────────────── -->
    <section data-screen="upload" hidden>
      <header class="screen-header">
        <h1>Uploading</h1>
      </header>

      <p class="muted" id="upload-summary">Preparing…</p>

      <div class="card-deck-stage" id="upload-deck"></div>
    </section>

    <!-- ─────────────────────────────────────────────
         SCREEN 7: done
         ───────────────────────────────────────────── -->
    <section data-screen="done" hidden>
      <div class="done-wrap">
        <div class="done-check" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>All set</h1>
        <p class="muted" id="done-summary">Uploaded.</p>

        <div class="done-actions">
          <button class="primary-button" id="btn-scan-another-same" type="button">Scan more for this customer</button>
          <button class="secondary-button" id="btn-scan-different" type="button">Different customer</button>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="scripts/app.js?v=14"></script>
</body>
</html>
