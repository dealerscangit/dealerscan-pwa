<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <title>DealerScan</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS "Add to Home Screen" specifics (iOS ignores manifest for some of these) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DealerScan" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main>
    <!-- Screen: sign-in (first launch / no salesperson chosen) -->
    <section data-screen="signin" hidden>
      <h1>Welcome to DealerScan</h1>
      <p class="muted">Pick your name to get started.</p>
      <div class="scaffold-note">
        Sign-in list comes from <code>scripts/currentUser.js → SALESPEOPLE</code>.
        Add the team roster there, then this screen renders the picker.
      </div>
    </section>

    <!-- Screen: home (signed in) -->
    <section data-screen="home" hidden>
      <h1>DealerScan</h1>
      <div class="scaffold-note">
        Scaffolding only. Home screen with "New Scan" button + recent activity
        gets built in the next pass.
      </div>
    </section>
  </main>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
